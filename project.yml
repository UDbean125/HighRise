# XcodeGen spec for HighRise.
#
# This Linux container has no Xcode, so the .xcodeproj is generated on a Mac
# rather than hand-committed (a hand-written pbxproj that can't be opened to
# verify is worse than none). On a Mac:
#
#     brew install xcodegen
#     cd HighRise
#     xcodegen generate
#     open HighRise.xcodeproj
#
# XcodeGen is a build-time project generator, not an app dependency — the
# shipped app still links only Apple frameworks (zero third-party runtime deps).

name: HighRise
options:
  bundleIdPrefix: com.bryansnotes
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    # Apple already has Builds 42, 46, 49, and 51 for version 1.0 on the App
    # Store Connect record — all unsandboxed ITMS-90296 rejections. 42/46/49
    # were the plain `HighRise` scheme; 51 came from the STALE external-drive
    # project (which has no HighRise-MAS target at all — never archive from
    # that checkout). App Store uploads must archive the sandboxed
    # `HighRise-MAS` scheme from THIS project; the schemes' archive actions
    # below label and warn about this in Organizer. Every new upload needs a
    # higher build number (Xcode Cloud numbers its own builds — its counter is
    # past 53 — so local archives start at 54). Bump this before local
    # archiving. NOTE: App Store submissions must be archived with a RELEASE
    # Xcode (Cloud runs 26.6); the local Xcode 27 beta gets "beta version of
    # Xcode" rejections at Add-for-Review.
    CURRENT_PROJECT_VERSION: "54"
    CODE_SIGN_STYLE: Automatic
    # Set your signing team here (or in Xcode) to run a signed build.
    DEVELOPMENT_TEAM: ""

targets:
  HighRise:
    type: application
    platform: macOS
    sources:
      - path: HighRise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bryansnotes.highrise
        PRODUCT_NAME: HighRise
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: HighRise/Info.plist
        CODE_SIGN_ENTITLEMENTS: HighRise/HighRise.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  # Sandboxed Mac App Store variant — same sources as `HighRise`, differing
  # only in entitlements (app-sandbox on, Mail scripting-targets instead of
  # Apple Events automation) and the MAS_BUILD flag, which gates Outlook out
  # entirely (no sandboxed automation route exists for it). See
  # MAS_VARIANT_PLAN.md. Known open risk: whether Mail's `com.apple.mail.compose`
  # scripting-target access group actually covers *sending*, not just
  # drafting, under the sandbox — unverified until built and tested on a Mac.
  HighRise-MAS:
    type: application
    platform: macOS
    sources:
      - path: HighRise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bryansnotes.highrise
        # Deliberately NOT "HighRise" — that would collide with the regular
        # `HighRise` target's Swift module name, since both compile the same
        # `HighRise` source folder. CFBundleDisplayName in Info.plist is
        # hardcoded to "HighRise" already, so the user-visible name is
        # unaffected by this.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: HighRise/Info.plist
        CODE_SIGN_ENTITLEMENTS: HighRise/HighRise-MAS.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS_BUILD

  HighRiseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HighRiseTests
    dependencies:
      - target: HighRise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bryansnotes.highriseTests
        GENERATE_INFOPLIST_FILE: YES

  # iOS companion. AppleScript automation (how the macOS app drives Mail/
  # Outlook) doesn't exist on iOS, so this target reuses only the portable,
  # Foundation-only import/merge core (listed explicitly below — each file
  # also belongs to the macOS `HighRise` target's `HighRise` source path, so
  # it's compiled into both, not moved) and hands each recipient to
  # `MFMailComposeViewController` instead of scripting Mail. See
  # `HighRiseMobile/HighRiseMobileApp.swift`.
  HighRiseMobile:
    type: application
    platform: iOS
    sources:
      - path: HighRiseMobile
      - path: HighRise/Models/Contact.swift
      - path: HighRise/Models/EmailTemplate.swift
      - path: HighRise/Models/TemplateVariant.swift
      - path: HighRise/Models/MergePreview.swift
      - path: HighRise/Models/RecipientTable.swift
      - path: HighRise/Models/FieldSynonyms.swift
      - path: HighRise/Models/StarterTemplate.swift
      - path: HighRise/Models/MergeFieldCatalog.swift
      - path: HighRise/Services/ContentLinter.swift
      - path: HighRise/Services/GreetingCheck.swift
      - path: HighRise/Services/PlaceholderCheck.swift
      - path: HighRise/Services/CSVParser.swift
      - path: HighRise/Services/EmailValidator.swift
      - path: HighRise/Services/TemplateMergeEngine.swift
      - path: HighRise/Services/MergeValueFormatter.swift
      - path: HighRise/Services/DuplicateDetector.swift
      - path: HighRise/Services/ImportCleaner.swift
      - path: HighRise/Services/ImportPipeline.swift
      - path: HighRise/Services/ContactDataFiller.swift
      - path: HighRise/Services/NameInference.swift
      - path: HighRise/Services/EnrichmentProvider.swift
      - path: HighRise/Services/ApolloEnrichmentProvider.swift
      - path: HighRise/Services/EnrichmentEngine.swift
      - path: HighRise/Services/EnrichmentKeyStore.swift
      - path: HighRise/Services/MarkdownToHTML.swift
      - path: HighRise/Services/Greeting.swift
      - path: HighRise/Services/NextStep.swift
    settings:
      base:
        # Same bundle ID as the macOS `HighRise` target, deliberately — this
        # is what lets both platforms live under one "Universal Purchase"
        # App Store Connect app record instead of two separate listings.
        # Product NAME is still NOT "HighRise" (that would collide with the
        # macOS target's Swift module name) — CFBundleDisplayName below is
        # what the user actually sees on the Home Screen; the module stays
        # "HighRiseMobile" to match `@testable import HighRiseMobile` in
        # HighRiseMobileTests.
        PRODUCT_BUNDLE_IDENTIFIER: com.bryansnotes.highrise
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: HighRiseMobile/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  HighRiseMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HighRiseMobileTests
    dependencies:
      - target: HighRiseMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bryansnotes.highrise.mobileTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  HighRise:
    build:
      targets:
        HighRise: all
        HighRiseTests: [test]
    test:
      targets:
        - HighRiseTests
    # Guard rails against the repeat ITMS-90296 mistake (Builds 42/46/49):
    # this scheme's archive is the UNSANDBOXED Developer ID build and must
    # never be uploaded to App Store Connect. The archive name says so in
    # Organizer, and archiving on a Mac (not CI) pops a warning dialog.
    archive:
      customArchiveName: HighRise Developer-ID (NOT for App Store)
      postActions:
        - name: Warn — wrong scheme for the Mac App Store
          settingsTarget: HighRise
          script: |
            if [ -z "$CI" ] && [ -z "$GITHUB_ACTIONS" ]; then
              ( /usr/bin/osascript -e 'display alert "Not an App Store build" message "This archive is the UNSANDBOXED Developer ID build (scheme: HighRise). App Store Connect rejects it with ITMS-90296.\n\nFor the Mac App Store, archive the HighRise-MAS scheme — its archive shows up in Organizer as “HighRise App Store (sandboxed)”." as critical' >/dev/null 2>&1 & )
            fi
  HighRiseMobile:
    build:
      targets:
        HighRiseMobile: all
        HighRiseMobileTests: [test]
    test:
      targets:
        - HighRiseMobileTests

  HighRise-MAS:
    build:
      targets:
        HighRise-MAS: all
        HighRiseTests: [test]
    test:
      targets:
        - HighRiseTests
    archive:
      customArchiveName: HighRise App Store (sandboxed)
      postActions:
        - name: Confirm — correct scheme for the Mac App Store
          settingsTarget: HighRise-MAS
          script: |
            if [ -z "$CI" ] && [ -z "$GITHUB_ACTIONS" ]; then
              ( /usr/bin/osascript -e 'display notification "Sandboxed App Store build — distribute this archive." with title "HighRise-MAS archive ✓"' >/dev/null 2>&1 & )
            fi
