name: Windows App CI

# Compiles the WinUI 3 app (HighRise.App). WinUI requires the Windows App SDK
# and can only build on Windows, so this runs on windows-latest — it's the sole
# build verification for the app (the Core/Mail libraries are tested separately
# on Ubuntu in windows-core-ci.yml).

on:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/windows-app-ci.yml"
  pull_request:
    paths:
      - "windows/**"
      - ".github/workflows/windows-app-ci.yml"

jobs:
  app:
    name: Build HighRise.App (WinUI 3)
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Run from windows/ so windows/global.json pins the .NET 8 SDK. WinUI 3 +
      # Windows App SDK 1.6 needs SDK 8's MSBuild PRI tooling; the runner's
      # default SDK 10 lacks the expected task assembly (MSB4062).
      - name: Show SDK
        working-directory: windows
        run: dotnet --version

      - name: Restore
        working-directory: windows
        run: dotnet restore src/HighRise.App/HighRise.App.csproj -p:Platform=x64

      - name: Build
        working-directory: windows
        run: dotnet build src/HighRise.App/HighRise.App.csproj -c Release -p:Platform=x64 --no-restore
