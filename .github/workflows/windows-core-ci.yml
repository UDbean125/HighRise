name: Windows Core CI

# Builds and unit-tests HighRise.Core — the platform-agnostic .NET port of the
# mail-merge logic. It has no WinUI/Windows dependencies, so it runs on Ubuntu
# (the WinUI app and OAuth senders are built on Windows separately).

on:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/windows-core-ci.yml"
  pull_request:
    paths:
      - "windows/**"
      - ".github/workflows/windows-core-ci.yml"

jobs:
  core:
    name: Build & test HighRise.Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test HighRise.Core
        run: dotnet test windows/tests/HighRise.Core.Tests/HighRise.Core.Tests.csproj -c Release

      - name: Test HighRise.Mail
        run: dotnet test windows/tests/HighRise.Mail.Tests/HighRise.Mail.Tests.csproj -c Release
