name: CI

# Build the HighRise app and run its test suite on every push and pull request.
# Runs on a macOS runner because the app needs Xcode / the Apple SDKs.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme HighRise \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -80
