name: CI

# Build the HighRise app and run its test suite on every push and pull request.
# Runs on a macOS runner because the app needs Xcode / the Apple SDKs.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-latest

    steps:
      - name: Check out
        uses: actions/checkout@v5

      # Pre-staged for the Icon Composer .icon (which needs Xcode 26+ to compile).
      # Guarded: selects the newest Xcode >= 26 if the runner has one, otherwise
      # keeps the default toolchain — so this never fails CI before the .icon is
      # added. Matches 26 through 29 (devs are already on macOS 27 / Xcode 27).
      - name: Select Xcode 26+ if available
        run: |
          XC=$(ls -d /Applications/Xcode_2[6-9]*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then
            echo "Selecting $XC"
            sudo xcode-select -s "$XC/Contents/Developer"
          else
            echo "Xcode 26+ not on this runner; using default. (Needed once HighRise.icon is added.)"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme HighRise \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log | tail -80

      # The iOS companion (HighRiseMobile) has no AppleScript to drive Mail/
      # Outlook, so it can't reuse the macOS send path — it reuses the shared
      # Foundation-only import/merge core and hands off to
      # MFMailComposeViewController instead.
      #
      # Finding a simulator: `xcodebuild -showdestinations` was tried first,
      # but right after a fresh `xcodegen generate` it can report only the
      # generic placeholder destination ("Any iOS Simulator Device") with no
      # real device UUIDs yet, which broke both a `simctl create` fallback
      # (the runtime name "iOS-latest" isn't valid — simctl rejected it) and
      # a second -showdestinations retry (which then picked the placeholder
      # itself). Querying `simctl list devices` directly sidesteps all of
      # that — the runner images ship with real iOS Simulator devices
      # pre-installed, so this just needs one of their UDIDs (preferring an
      # iPhone, but any available iOS device works).
      - name: Test iOS app
        run: |
          set -o pipefail
          DEST=$(xcrun simctl list devices available -j | jq -r '
            .devices
            | to_entries
            | map(select(.key | test("iOS"; "i")))
            | map(.value[])
            | map(select(.isAvailable))
            | (map(select(.name | test("iPhone"))) + .)
            | .[0].udid // empty
          ')
          if [ -z "$DEST" ]; then
            echo "::error::No available iOS Simulator device found on this runner."
            exit 1
          fi
          echo "Using simulator id: $DEST"
          xcodebuild test \
            -scheme HighRiseMobile \
            -destination "platform=iOS Simulator,id=$DEST" \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild-ios.log | tail -80

  # The Windows companion (Windows/HighRise-Merge.ps1) targets Windows
  # PowerShell 5.1, which only exists on Windows — so its dry run is exercised
  # here under both 5.1 and PowerShell 7. -DryRun never touches Outlook.
  windows-dry-run:
    name: Windows merge tool dry run
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Dry run under Windows PowerShell 5.1
        shell: powershell
        run: |
          $out = & .\Windows\HighRise-Merge.ps1 -Csv .\Examples\sample-recipients.csv -Template .\Windows\Examples\sample-template.txt -DryRun *>&1 | Out-String
          Write-Host $out
          if ($out -notlike '*3 message(s) would be drafted, 2 blocked*') { throw 'Unexpected dry-run summary' }
          if ($out -notlike '*Quick question about Acme, Inc.*') { throw 'Merged subject missing from output' }
          if ($out -notlike '*Invalid email address: not-an-email*') { throw 'Invalid-email row was not blocked' }
          if ($out -notlike '*Missing data for: Company*') { throw 'Missing-field row was not blocked' }

      - name: Dry run under PowerShell 7
        shell: pwsh
        run: |
          $out = & .\Windows\HighRise-Merge.ps1 -Csv .\Examples\sample-recipients.csv -Template .\Windows\Examples\sample-template.txt -DryRun *>&1 | Out-String
          Write-Host $out
          if ($out -notlike '*3 message(s) would be drafted, 2 blocked*') { throw 'Unexpected dry-run summary' }
          if ($out -notlike '*Quick question about Acme, Inc.*') { throw 'Merged subject missing from output' }
